name: Python CI

on:
  push:
    paths:
      - '**/*.py'
      - 'requirements.txt'
      - '.pylintrc'
  pull_request:
    paths:
      - '**/*.py'
      - 'requirements.txt'
      - '.pylintrc'
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install lightweight tools
        run: |
          python -m pip install --upgrade pip
          pip install --disable-pip-version-check --no-input pylint pytest
      - name: Lint
        run: |
          pylint $(git ls-files '*.py')
      - name: Run tests (if tests exist)
        run: |
          if compgen -G "tests/**/*.py" > /dev/null; then
            echo "Running pytest"
            pytest -q
          else
            echo "No tests directory found, skipping"
          fi


