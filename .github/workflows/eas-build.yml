name: Zero-Trust EAS Build Gate

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.0
          
      - name: Install Dependencies
        run: |
          cd frontend && pnpm install --frozen-lockfile
          cd ../firebase/functions && npm install
          
      - name: Strict Typecheck (Frontend)
        run: cd frontend && pnpm typecheck
        
      - name: Strict Typecheck (Backend)
        run: cd firebase/functions && npm run build
        
      - name: Unit Tests (Jest)
        run: |
          cd frontend && pnpm exec jest --passWithNoTests
          
  build:
    name: Expo EAS Build
    runs-on: ubuntu-latest
    needs: [lint-and-test] # Will physically not run if tests fail
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.0

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install Dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: EAS Build Preview
        if: github.event_name == 'pull_request' && secrets.EXPO_TOKEN != ''
        run: cd frontend && eas build --profile preview --platform android --non-interactive

      - name: EAS Build Production
        if: github.event_name == 'push'
        run: cd frontend && eas build --profile production --platform android --non-interactive
