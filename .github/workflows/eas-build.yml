name: Zero-Trust EAS Build Gate

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - 'firebase/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - 'firebase/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'

jobs:
  lint-and-test:
    name: Turborepo Monorepo Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install pnpm
        uses: pnpm/action-setup@v4
          
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
          
      - name: Monorepo Lint (Turborepo)
        run: pnpm run lint
        
      - name: Monorepo Typecheck (Turborepo)
        run: pnpm run typecheck
        
      - name: Unit Tests (Jest)
        run: |
          cd frontend && pnpm exec jest --passWithNoTests

  build:
    name: Expo EAS Build
    runs-on: ubuntu-latest
    needs: [lint-and-test] # Will physically not run if tests fail
    # Prevent expensive EAS builds from running on Dependabot PRs 
    if: github.actor != 'dependabot[bot]'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: EAS Build Preview
        if: github.event_name == 'pull_request'
        run: cd frontend && eas build --profile preview --platform android --non-interactive

      - name: EAS Build Production
        if: github.event_name == 'push'
        run: cd frontend && eas build --profile production --platform android --non-interactive
