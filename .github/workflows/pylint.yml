name: Pylint

on:
  push:
    paths:
      - '**/*.py'
      - '.pylintrc'
      - 'requirements.txt'
  pull_request:
    paths:
      - '**/*.py'
      - '.pylintrc'
      - 'requirements.txt'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint
      - name: Run pylint
        run: |
          pylint $(git ls-files '*.py')
